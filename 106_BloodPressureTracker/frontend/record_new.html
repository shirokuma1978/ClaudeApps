<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規記録 - 血圧記録</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-row">
      <button class="back-btn" onclick="window.location.href='/'">←</button>
      <h1>新規記録</h1>
      <span></span>
    </div>
  </header>

  <main class="content">
    <form id="record-form" class="detail-section">
      <div class="form-group">
        <label class="form-label" for="measured_date">日付<span class="required">*</span></label>
        <input type="date" id="measured_date" class="form-control" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="time_slot">時間帯</label>
        <select id="time_slot" class="form-control">
          <option value="">選択してください</option>
          <option value="朝">朝</option>
          <option value="夜">夜</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">収縮期（上）/ 拡張期（下）<span class="required">*</span></label>
        <div class="bp-input-row">
          <input type="number" id="systolic" class="form-control" min="30" max="300"
                 inputmode="numeric" placeholder="120" required>
          <span class="bp-sep">/</span>
          <input type="number" id="diastolic" class="form-control" min="20" max="200"
                 inputmode="numeric" placeholder="80" required>
          <span class="bp-unit">mmHg</span>
        </div>
        <div id="bp-error" class="error-msg" style="display:none;"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="pulse">脈拍</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" id="pulse" class="form-control" min="20" max="300"
                 inputmode="numeric" placeholder="70" style="max-width:120px">
          <span class="bp-unit">回/分</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="memo">メモ</label>
        <textarea id="memo" class="form-control" maxlength="500" rows="3"
                  placeholder="服薬、体調など..."></textarea>
      </div>

      <div class="btn-row">
        <button type="button" class="btn btn-secondary" onclick="window.location.href='/'">
          キャンセル
        </button>
        <button type="submit" id="save-btn" class="btn btn-primary">保存</button>
      </div>
    </form>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/record.js"></script>
</body>
</html>
