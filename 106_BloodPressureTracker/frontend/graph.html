<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>グラフ - 血圧記録</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-row">
      <button class="back-btn" onclick="window.location.href='/'">←</button>
      <h1>グラフ</h1>
      <span></span>
    </div>
  </header>

  <main class="content">
    <div class="detail-section" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="period-btn btn btn-primary" data-days="14">2週間</button>
        <button class="period-btn btn btn-secondary" data-days="30">1ヶ月</button>
        <button class="period-btn btn btn-secondary" data-days="90">3ヶ月</button>
        <button class="period-btn btn btn-secondary" data-days="0">全期間</button>
      </div>
    </div>

    <div class="detail-section">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">
        <span style="color:#C62828">●</span> 収縮期（上）
        <span style="color:#1565C0">●</span> 拡張期（下）
        <span style="color:#2E7D32">●</span> 脈拍
      </div>
      <div style="position:relative;height:280px">
        <canvas id="bp-chart"></canvas>
      </div>
    </div>

    <div id="stats-section" class="detail-section" style="display:none;">
      <div style="font-weight:700;margin-bottom:12px">期間の統計</div>
      <div id="stats-content"></div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/graph.js"></script>
</body>
</html>
