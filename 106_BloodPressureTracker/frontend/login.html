<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 血圧記録</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-logo">❤️</div>
    <h1 class="auth-title">血圧記録</h1>

    <div class="auth-card">
      <h2 class="auth-card-title">ログイン</h2>

      <div id="error-msg" class="auth-error" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">メールアドレス</label>
          <input type="email" id="email" class="form-control" placeholder="example@email.com" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">パスワード</label>
          <input type="password" id="password" class="form-control" placeholder="6文字以上" required>
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%;margin-top:8px">
          ログイン
        </button>
      </form>
    </div>

    <p class="auth-switch">
      アカウントをお持ちでない方は
      <a href="/register.html">新規登録</a>
    </p>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const errEl = document.getElementById("error-msg");
      errEl.style.display = "none";
      btn.disabled = true;
      btn.textContent = "ログイン中...";
      try {
        await login(
          document.getElementById("email").value,
          document.getElementById("password").value
        );
        window.location.href = "/";
      } catch (err) {
        errEl.textContent = err.detail || "ログインに失敗しました";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.textContent = "ログイン";
      }
    });
  </script>
</body>
</html>
